global:
  environment: development

app:
  replicaCount: 1
  image:
    tag: dev-latest
  service:
    type: NodePort
  ingress:
    enabled: false
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: "dev,kubernetes"
    - name: SPRING_JPA_SHOW_SQL
      value: "true"
    - name: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL
      value: "true"

database:
  host: analytics-postgres
  port: 5432
  name: fintech_analytics
  username: postgres
  password: postgres123
  ssl: false

postgresql:
  enabled: true
  auth:
    database: fintech_analytics
    username: postgres
    password: postgres123

monitoring:
  enabled: false

metrics:
  enabled: false

grafana:
  enabled: false

serviceAccount:
  create: true

namespace:
  create: false
