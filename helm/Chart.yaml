apiVersion: v2
name: fintech-analytics
description: FinTech Analytics Service for transaction analysis
type: application
version: 0.1.0
appVersion: "1.0.0"
maintainers:
  - name: Analytics Team
    email: analytics@fintech.ru
    url: https://fintech.ru
keywords:
  - fintech
  - analytics
  - spring-boot
  - postgresql
  - monitoring
annotations:
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
dependencies:
  - name: postgresql
    version: 12.2.3
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    tags:
      - database
  - name: redis
    version: 17.3.14
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    tags:
      - cache
  - name: prometheus
    version: 25.13.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.enabled
    tags:
      - monitoring
  - name: grafana
    version: 6.57.4
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.enabled
    tags:
      - monitoring