{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-analytics
  namespace: {{ .Values.monitoring.namespace | default "monitoring" }}
  labels:
    release: monitoring
    heritage: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app: fintech-analytics
      release: {{ .Release.Name }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.path | default "/actuator/prometheus" }}
      interval: {{ .Values.metrics.interval | default "30s" }}
      scrapeTimeout: {{ .Values.metrics.scrapeTimeout | default "10s" }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  {{- end }}