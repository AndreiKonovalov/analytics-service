{{- if .Values.app.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fintech-analytics.fullname" . }}
  namespace: {{ .Release.Namespace | default "fintech" }}
  labels:
    {{- include "fintech-analytics.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.app.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
      {{- end }}
spec:
  ingressClassName: {{ .Values.app.ingress.className }}
  {{- if .Values.app.ingress.tls }}
  tls:
    {{- range .Values.app.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.app.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "fintech-analytics.fullname" $ }}
                port:
                  number: {{ $.Values.app.service.port }}
          {{- end }}
    {{- end }}
  {{- end }}