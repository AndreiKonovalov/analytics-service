global:
  environment: production
  domain: fintech.ru

app:
  replicaCount: 3
  image:
    tag: prod-latest
    pullPolicy: Always
  service:
    type: ClusterIP
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
      nginx.ingress.kubernetes.io/rate-limit: "100r/s"
      nginx.ingress.kubernetes.io/rate-limit-burst: "200"
      nginx.ingress.kubernetes.io/limit-connections: "1000"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: analytics.fintech.ru
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: analytics-tls-prod
        hosts:
          - analytics.fintech.ru
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8080"
    sidecar.istio.io/inject: "true"
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - analytics-service
          topologyKey: kubernetes.io/hostname

database:
  external:
    enabled: true
    host: postgres-ha.cluster.local
    port: 5432
  ssl: true
  sslMode: require
  maxConnections: 50

monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 15s
    scrapeTimeout: 5s

logging:
  enabled: true
  level:
    root: WARN
    ru.analytics: INFO
  format: json
  output:
    - loki
  loki:
    url: http://loki.monitoring.svc.cluster.local:3100

cache:
  enabled: true
  type: redis
  host: redis-ha.cluster.local
  passwordFromSecret:
    name: redis-credentials
    key: password

externalServices:
  auditService:
    enabled: true
    url: http://audit-service.production.svc.cluster.local:8080
  notificationService:
    enabled: true
    url: http://notification-service.production.svc.cluster.local:8080
  fraudDetectionService:
    enabled: true
    url: http://fraud-detection-service.production.svc.cluster.local:8080

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 30
  s3:
    bucket: fintech-analytics-backups
    region: eu-west-1
    prefix: "analytics/database/"
