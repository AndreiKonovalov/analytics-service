# Конфигурация для Windows/Docker Desktop
global:
  environment: windows-dev
  domain: local

app:
  name: analytics-service
  replicaCount: 1  # Одна реплика для экономии ресурсов
  image:
    repository: fintech/analytics-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort  # NodePort для доступа с хоста
    port: 8080
    nodePort: 30080  # Фиксированный порт
  ingress:
    enabled: false  # Отключаем для простоты
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  autoscaling:
    enabled: false  # Отключаем для локальной разработки
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: "windows,kubernetes"
    - name: JAVA_OPTS
      value: "-Xmx512m -Xms256m -XX:+UseG1GC"
    - name: SPRING_JPA_SHOW_SQL
      value: "true"
    - name: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL
      value: "true"
    - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
      value: "health,metrics,prometheus,info,env,beans"
    - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
      value: "always"

# Database configuration - исправлено для standalone
database:
  type: postgresql
  host: analytics-postgres  # <-- Имя сервиса из postgresql.yaml
  port: 5432
  name: fintech_analytics
  username: postgres
  password: postgres123
  ssl: false

# Встроенный PostgreSQL (уберите внешние зависимости)
postgresql:
  enabled: true
  image:
    tag: 15-alpine
  auth:
    database: fintech_analytics
    username: postgres
    password: postgres123
  persistence:
    enabled: false  # Для разработки
    size: 1Gi

redis:
  enabled: false  # Отключаем для экономии ресурсов

monitoring:
  enabled: false  # Отключаем мониторинг для простоты

metrics:
  enabled: false

grafana:
  enabled: false

# ServiceAccount для standalone
serviceAccount:
  create: true
  name: ""

# Namespace для standalone
namespace:
  create: false  # Будем создавать через kubectl
