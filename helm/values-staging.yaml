global:
  environment: staging
  domain: staging.fintech.ru

app:
  replicaCount: 2
  image:
    tag: staging-latest
  service:
    type: LoadBalancer
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
    hosts:
      - host: analytics.staging.fintech.ru
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: analytics-tls-staging
        hosts:
          - analytics.staging.fintech.ru
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

database:
  external:
    enabled: true
    host: postgres-staging.cluster.local
    port: 5432

monitoring:
  enabled: true

features:
  nPlusOneDetection: true
  queryMetrics: true
  slowQueryLogging: true
  transactionTracing: true