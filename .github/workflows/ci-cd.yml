name: CI/CD Pipeline with Helm

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/analytics-service
  HELM_CHART_DIR: ./helm
  K8S_NAMESPACE: fintech

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

  lint-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Lint Helm chart
        run: |
          helm lint $HELM_CHART_DIR
          helm dependency update $HELM_CHART_DIR
          helm template $HELM_CHART_DIR --dry-run

  build:
    needs: [test, lint-helm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy to dev
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_DEV }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          chmod +x scripts/helm-install.sh
          ./scripts/helm-install.sh dev $K8S_NAMESPACE

      - name: Verify deployment
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_DEV }}
        run: |
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get svc -n $K8S_NAMESPACE

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy to staging
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          chmod +x scripts/helm-install.sh
          ./scripts/helm-install.sh staging $K8S_NAMESPACE

      - name: Run smoke tests
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          kubectl wait --for=condition=ready pod -n $K8S_NAMESPACE -l app.kubernetes.io/name=fintech-analytics --timeout=300s
          SERVICE_URL=$(kubectl get svc -n $K8S_NAMESPACE analytics-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Running smoke tests on $SERVICE_URL"
          # Добавьте ваши smoke-тесты

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy to production
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          chmod +x scripts/helm-install.sh
          ./scripts/helm-install.sh prod $K8S_NAMESPACE

      - name: Verify production deployment
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          kubectl get pods -n $K8S_NAMESPACE -l app.kubernetes.io/name=fintech-analytics
          kubectl get hpa -n $K8S_NAMESPACE