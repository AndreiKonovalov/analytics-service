apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-dashboard-config
  namespace: fintech
data:
  dashboard.json: |
    {
      "apiVersion": "dashboard.k8s.io/v1alpha1",
      "kind": "Dashboard",
      "metadata": {
        "name": "fintech-analytics-dashboard",
        "namespace": "fintech"
      },
      "spec": {
        "sections": [
          {
            "name": "Application Overview",
            "widgets": [
              {
                "name": "Deployment Status",
                "type": "deployments",
                "filters": {
                  "namespace": "fintech"
                }
              },
              {
                "name": "Pod Status",
                "type": "pods",
                "filters": {
                  "namespace": "fintech"
                }
              },
              {
                "name": "Service Status",
                "type": "services",
                "filters": {
                  "namespace": "fintech"
                }
              }
            ]
          },
          {
            "name": "Metrics & Monitoring",
            "widgets": [
              {
                "name": "CPU Usage",
                "type": "graph",
                "query": "rate(container_cpu_usage_seconds_total{namespace='fintech'}[5m])",
                "dataSource": "prometheus"
              },
              {
                "name": "Memory Usage",
                "type": "graph",
                "query": "container_memory_working_set_bytes{namespace='fintech'}",
                "dataSource": "prometheus"
              },
              {
                "name": "HTTP Requests",
                "type": "graph",
                "query": "rate(http_server_requests_seconds_count{namespace='fintech'}[5m])",
                "dataSource": "prometheus"
              }
            ]
          },
          {
            "name": "Database & Resources",
            "widgets": [
              {
                "name": "Database Connections",
                "type": "metric",
                "query": "pg_stat_database_numbackends{namespace='fintech'}",
                "dataSource": "prometheus"
              },
              {
                "name": "JVM Memory",
                "type": "graph",
                "query": "jvm_memory_used_bytes{namespace='fintech', area='heap'}",
                "dataSource": "prometheus"
              },
              {
                "name": "Hibernate Statistics",
                "type": "graph",
                "query": "hibernate_statistics_query_execution_count{namespace='fintech'}",
                "dataSource": "prometheus"
              }
            ]
          }
        ]
      }
    }